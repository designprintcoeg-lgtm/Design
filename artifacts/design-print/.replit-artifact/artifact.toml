kind = "web"
previewPath = "/"
title = "Design Print Production Tracker"
version = "1.0.0"
id = "artifacts/design-print"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22746

[services.development]
run = "pnpm --filter @workspace/design-print run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/design-print", "run", "build" ]
publicDir = "artifacts/design-print/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22746"
BASE_PATH = "/"
