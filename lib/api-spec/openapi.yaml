openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Design Print Production Tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: customers
  - name: quotations
  - name: salesOrders
  - name: jobOrders
  - name: jobStages
  - name: machines
  - name: materials
  - name: jobCosting
  - name: qc
  - name: dashboard
  - name: reports

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated

  # Users
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Customers
  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/{id}:
    get:
      operationId: getCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Quotations
  /quotations:
    get:
      operationId: listQuotations
      tags: [quotations]
      responses:
        "200":
          description: List of quotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quotation"
    post:
      operationId: createQuotation
      tags: [quotations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"

  /quotations/{id}:
    get:
      operationId: getQuotation
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quotation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
    patch:
      operationId: updateQuotation
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuotationUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quotation"
    delete:
      operationId: deleteQuotation
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quotations/{id}/convert:
    post:
      operationId: convertQuotationToOrder
      tags: [quotations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Sales order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"

  # Sales Orders
  /sales-orders:
    get:
      operationId: listSalesOrders
      tags: [salesOrders]
      responses:
        "200":
          description: List of sales orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesOrder"
    post:
      operationId: createSalesOrder
      tags: [salesOrders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"

  /sales-orders/{id}:
    get:
      operationId: getSalesOrder
      tags: [salesOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"
    patch:
      operationId: updateSalesOrder
      tags: [salesOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SalesOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrder"

  /sales-orders/{id}/generate-job:
    post:
      operationId: generateJobOrder
      tags: [salesOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Job order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOrder"

  # Job Orders
  /job-orders:
    get:
      operationId: listJobOrders
      tags: [jobOrders]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: productionLine
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of job orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobOrder"
    post:
      operationId: createJobOrder
      tags: [jobOrders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobOrderInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOrder"

  /job-orders/{id}:
    get:
      operationId: getJobOrder
      tags: [jobOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job order with stages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOrderDetail"
    patch:
      operationId: updateJobOrder
      tags: [jobOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobOrderUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOrder"

  /job-orders/{id}/advance-stage:
    post:
      operationId: advanceJobStage
      tags: [jobOrders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StageAdvanceInput"
      responses:
        "200":
          description: Stage advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobOrder"

  # Job Stages
  /job-orders/{id}/stages:
    get:
      operationId: listJobStages
      tags: [jobStages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job stages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobStage"

  /job-stages/{id}:
    patch:
      operationId: updateJobStage
      tags: [jobStages]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobStageUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStage"

  # Machines
  /machines:
    get:
      operationId: listMachines
      tags: [machines]
      responses:
        "200":
          description: List of machines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Machine"
    post:
      operationId: createMachine
      tags: [machines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"

  /machines/{id}:
    get:
      operationId: getMachine
      tags: [machines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Machine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
    patch:
      operationId: updateMachine
      tags: [machines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MachineUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Machine"
    delete:
      operationId: deleteMachine
      tags: [machines]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Materials / Inventory
  /materials:
    get:
      operationId: listMaterials
      tags: [materials]
      responses:
        "200":
          description: List of materials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"
    post:
      operationId: createMaterial
      tags: [materials]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"

  /materials/{id}:
    get:
      operationId: getMaterial
      tags: [materials]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
    patch:
      operationId: updateMaterial
      tags: [materials]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaterialUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Material"
    delete:
      operationId: deleteMaterial
      tags: [materials]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Job Costing
  /job-orders/{id}/costing:
    get:
      operationId: getJobCosting
      tags: [jobCosting]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job costing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCosting"
    put:
      operationId: upsertJobCosting
      tags: [jobCosting]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobCostingInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobCosting"

  # QC
  /job-orders/{id}/qc:
    get:
      operationId: getQCChecklist
      tags: [qc]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: QC checklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QCChecklist"
    put:
      operationId: upsertQCChecklist
      tags: [qc]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QCChecklistInput"
      responses:
        "200":
          description: Upserted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QCChecklist"

  # Dashboard
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/jobs-by-line:
    get:
      operationId: getJobsByLine
      tags: [dashboard]
      responses:
        "200":
          description: Jobs grouped by production line
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupCount"

  /dashboard/jobs-by-stage:
    get:
      operationId: getJobsByStage
      tags: [dashboard]
      responses:
        "200":
          description: Jobs grouped by current stage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupCount"

  /dashboard/urgent-jobs:
    get:
      operationId: getUrgentJobs
      tags: [dashboard]
      responses:
        "200":
          description: Urgent and very urgent jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobOrder"

  /dashboard/delayed-jobs:
    get:
      operationId: getDelayedJobs
      tags: [dashboard]
      responses:
        "200":
          description: Delayed jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobOrder"

  /dashboard/due-today:
    get:
      operationId: getJobsDueToday
      tags: [dashboard]
      responses:
        "200":
          description: Jobs due today
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobOrder"

  /dashboard/machine-load:
    get:
      operationId: getMachineLoad
      tags: [dashboard]
      responses:
        "200":
          description: Machine utilization
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MachineLoad"

  # Reports
  /reports/production-performance:
    get:
      operationId: getProductionPerformance
      tags: [reports]
      responses:
        "200":
          description: Production performance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionPerformanceReport"

  /reports/waste:
    get:
      operationId: getWasteReport
      tags: [reports]
      responses:
        "200":
          description: Waste report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WasteReportItem"

  /reports/qc-rejection:
    get:
      operationId: getQCRejectionReport
      tags: [reports]
      responses:
        "200":
          description: QC rejection report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QCRejectionItem"

  /reports/job-profitability:
    get:
      operationId: getJobProfitabilityReport
      tags: [reports]
      responses:
        "200":
          description: Job profitability report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobProfitabilityItem"

  /reports/machine-utilization:
    get:
      operationId: getMachineUtilizationReport
      tags: [reports]
      responses:
        "200":
          description: Machine utilization report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MachineUtilizationItem"

  /reports/low-stock:
    get:
      operationId: getLowStockAlerts
      tags: [reports]
      responses:
        "200":
          description: Materials below minimum quantity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Material"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, username, name, role, isActive, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, sales, operations, designer, finalizer, production_manager, machine_operator, qc, warehouse, finance, delivery]
        isActive:
          type: boolean
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, password, name, role]
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, sales, operations, designer, finalizer, production_manager, machine_operator, qc, warehouse, finance, delivery]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        isActive:
          type: boolean
        password:
          type: string

    Customer:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        companyName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        customerType:
          type: ["string", "null"]
        source:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    CustomerInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        companyName:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        email:
          type: string
        address:
          type: string
        customerType:
          type: string
        source:
          type: string
        notes:
          type: string

    CustomerUpdate:
      type: object
      properties:
        name:
          type: string
        companyName:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        email:
          type: string
        address:
          type: string
        customerType:
          type: string
        source:
          type: string
        notes:
          type: string

    Quotation:
      type: object
      required: [id, quotationNumber, customerId, productType, quantity, unitPrice, totalPrice, status, createdAt]
      properties:
        id:
          type: integer
        quotationNumber:
          type: string
        customerId:
          type: integer
        customerName:
          type: ["string", "null"]
        productType:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
        totalPrice:
          type: number
        paymentTerms:
          type: ["string", "null"]
        deliveryDate:
          type: ["string", "null"]
        status:
          type: string
          enum: [draft, sent, approved, rejected]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    QuotationInput:
